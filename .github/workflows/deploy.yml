name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/fastapi-app:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/fastapi-app:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: fastapitest007
          images: ${{ secrets.REGISTRY_LOGIN_SERVER }}/fastapi-app:${{ github.sha }}
          
          app-settings-json: |
            [
              {
                "name": "SecretKey",
                "value": "${{ secrets.SECRET_KEY }}",
                "slotSetting": false
              },
              {
                "name": "SecretKeyValue",
                "value": "${{ secrets.SECRET_KEY_VALUE }}",
                "slotSetting": false
              }
            ]